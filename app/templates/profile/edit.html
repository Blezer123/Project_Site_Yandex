<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактирование профиля — GameHub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <div class="steam-logo">
            <h1>🎮 GAMEHUB</h1>
            <span>игровое сообщество</span>
        </div>

        <h2>✏️ Редактирование профиля</h2>

        <div class="flash-messages">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
        </div>

        <form method="POST">
            <div class="form-group">
                <label>Имя пользователя</label>
                <input type="text" name="username" class="form-control" value="{{ user.username }}" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" class="form-control" value="{{ user.email }}" required>
            </div>

            <hr>

            <div class="form-group">
                <label>Старый пароль</label>
                <input type="password" name="old_password" class="form-control">
            </div>

            <div class="form-group">
                <label>Новый пароль (мин. 6 символов)</label>
                <input type="password" name="new_password" class="form-control">
            </div>

            <button type="submit" class="btn-steam">💾 Сохранить изменения</button>
        </form>

        <div class="login-link">
            <a href="{{ url_for('profile.view', user_id=user.id) }}">← Назад к профилю</a>
        </div>
    </div>
</body>
</html>
